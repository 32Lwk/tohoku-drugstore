name: Deploy Maps Site

on:
  push:
    branches: [main]
    paths:
      - "tohoku/maps/**"
      - "prefectures/**/maps/**"
      - "shared/create_maps.py"
      - "shared/build_tohoku.py"
      - "shared/config.py"
      - "scripts/build_site.py"
      - ".github/workflows/deploy-maps.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        run: python scripts/build_site.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
